<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <title></title>
</head>

<body>
<nav class="navbar navbar-dark bg-dark">
    <a class="navbar-brand text-white">
        <b sec:authentication="name"></b>
        <span> with roles: </span>
        <span th:each="role : ${#authentication.principal.authorities}"
              th:text="${role.authority + ' '}"></span>
    </a>

    <form class="form-inline ml-auto" th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-secondary">Logout</button>
    </form>
</nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-2">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin}">Admin</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/user}">Users</a>
                </li>
            </ul>
        </div>
        <div class="col-10">
            <h1 class="my-3">Admin panel</h1>
            <div class="card mt-3">
                <ul class="nav nav-tabs">
                    <li class="nav-item">
                        <a class="nav-link active" data-toggle="tab" href="#usersTable">Users table</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-toggle="tab" href="#newUser">New User</a>
                    </li>
                </ul>

                <div class="tab-content">

                    <div class="tab-pane active" id="usersTable">
                        <table class="table table-striped table-hover">
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Surname</th>
                                <th>Age</th>
                                <th>Email</th>
                                <th>Roles</th>
                                <th>Edit</th>
                                <th>Delete</th>
                            </tr>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.id}"></td>
                                <td th:text="${user.name}"></td>
                                <td th:text="${user.surname}"></td>
                                <td th:text="${user.age}"></td>
                                <td th:text="${user.email}"></td>
                                <td>
                                    <span th:each="role : ${user.roles}" th:text="${role.name + ' '}"></span>
                                </td>
                                <td>
                                    <button type="button" class="btn btn-info"
                                            data-toggle="modal"
                                            th:data-target="'#editModal' + ${user.id}">Edit
                                    </button>
                                    <div class="modal fade" th:id="'editModal' + ${user.id}">
                                        <div class="modal-dialog">
                                            <div class="modal-content">
                                                <div class="modal-header">
                                                    <h5 class="modal-title">Edit user</h5>
                                                    <button type="button" class="close" data-dismiss="modal">&times;
                                                    </button>
                                                </div>
                                                <form th:action="@{/admin/update}" method="post">

                                                    <div class="modal-body">

                                                        <input type="hidden" name="id" th:value="${user.id}"/>

                                                        <div class="form-group">
                                                            <label>Name:</label>
                                                            <input type="text" class="form-control" name="name"
                                                                   th:value="${user.name}"/>
                                                        </div>

                                                        <div class="form-group">
                                                            <label>Surname:</label>
                                                            <input type="text" class="form-control" name="surname"
                                                                   th:value="${user.surname}"/>
                                                        </div>

                                                        <div class="form-group">
                                                            <label>Age:</label>
                                                            <input type="number" class="form-control" name="age"
                                                                   th:value="${user.age}"/>
                                                        </div>

                                                        <div class="form-group">
                                                            <label>Email:</label>
                                                            <input type="text" class="form-control" name="email"
                                                                   th:value="${user.email}"/>
                                                        </div>

                                                        <div class="form-group">
                                                            <label>Roles:</label>
                                                            <select name="rolesId" class="form-control" multiple>
                                                                <option th:each="role : ${roles}"
                                                                        th:value="${role.id}"
                                                                        th:text="${role.name}"
                                                                        th:selected="${user.roles.contains(role)}">
                                                                </option>
                                                            </select>
                                                        </div>

                                                        <div class="form-group">
                                                            <label>Password:</label>
                                                            <input type="password" class="form-control"
                                                                   name="password"
                                                                   th:value="${user.password}"/>
                                                        </div>
                                                    </div>
                                                    <div class="modal-footer">
                                                        <button type="button" class="btn btn-secondary"
                                                                data-dismiss="modal">Close
                                                        </button>
                                                        <button type="submit" class="btn btn-primary">Edit</button>
                                                    </div>
                                                </form>
                                            </div>
                                        </div>
                                    </div>
                                </td>


                                <td>
                                    <button type="button" class="btn btn-danger"
                                            data-toggle="modal"
                                            th:data-target="'#deleteModal' + ${user.id}">Delete
                                    </button>

                                    <div class="modal fade" th:id="'deleteModal' + ${user.id}">
                                        <div class="modal-dialog">
                                            <div class="modal-content">
                                                <div class="modal-header">
                                                    <h5 class="modal-title">Delete user</h5>
                                                    <button type="button" class="close" data-dismiss="modal">&times;
                                                    </button>
                                                </div>
                                                <form th:action="@{/admin/delete(id=${user.id})}" method="post">
                                                    <div class="modal-body">

                                                        <div class="form-group">
                                                            <label class="font-weight-bold d-block text-center">ID</label>
                                                            <input type="text" class="form-control"
                                                                   th:value="${user.id}" readonly/>
                                                        </div>
                                                        <div class="form-group">
                                                            <label class="font-weight-bold d-block text-center">First
                                                                name</label>
                                                            <input type="text" class="form-control"
                                                                   th:value="${user.name}" readonly/>
                                                        </div>
                                                        <div class="form-group">
                                                            <label class="font-weight-bold d-block text-center">Last
                                                                name</label>
                                                            <input type="text" class="form-control"
                                                                   th:value="${user.surname}" readonly/>
                                                        </div>
                                                        <div class="form-group">
                                                            <label class="font-weight-bold d-block text-center">Age</label>
                                                            <input type="number" class="form-control"
                                                                   th:value="${user.age}" readonly/>
                                                        </div>
                                                        <div class="form-group">
                                                            <label class="font-weight-bold d-block text-center">Email</label>
                                                            <input type="text" class="form-control"
                                                                   th:value="${user.email}" readonly/>
                                                        </div>
                                                        <div class="form-group">
                                                            <label class="font-weight-bold d-block text-center">Role</label>
                                                            <select class="form-control" multiple disabled>
                                                                <option th:each="role : ${user.roles}"
                                                                        th:text="${role.name}"></option>
                                                            </select>
                                                        </div>
                                                    </div>
                                                    <div class="modal-footer">
                                                        <button type="button" class="btn btn-secondary"
                                                                data-dismiss="modal">Close
                                                        </button>
                                                        <button type="submit" class="btn btn-danger">Delete</button>
                                                    </div>
                                                </form>
                                            </div>
                                        </div>
                                    </div>
                                </td>


                            </tr>
                        </table>
                    </div>

                    <div class="tab-pane" id="newUser">
                        <div class="card mt-2">
                            <div class="card-header"><b>Add new user</b></div>
                            <div class="card-body">
                                <form th:action="@{/admin/save}" th:object="${newUser}" method="post" class="mx-auto"
                                      style="max-width: 500px;">
                                    <div class="form-group">
                                        <label class="font-weight-bold d-block text-center"> Name:</label>
                                        <input type="text" class="form-control" th:field="*{name}" required/>
                                    </div>

                                    <div class="form-group">
                                        <label class="font-weight-bold d-block text-center"> Surname:</label>
                                        <input type="text" class="form-control" th:field="*{surname}" required/>
                                    </div>

                                    <div class="form-group">
                                        <label class="font-weight-bold d-block text-center"> Age:</label>
                                        <input type="number" class="form-control" th:field="*{age}" required
                                               min="1"/>
                                    </div>

                                    <div class="form-group">
                                        <label class="font-weight-bold d-block text-center"> Email:</label>
                                        <input type="text" class="form-control" th:field="*{email}" required/>
                                    </div>

                                    <div class="form-group">
                                        <label class="font-weight-bold d-block text-center"> Role:</label>
                                        <select name="rolesId" class="form-control" multiple>
                                            <option th:each="role : ${roles}"
                                                    th:value="${role.id}"
                                                    th:text="${role.name}">
                                            </option>
                                        </select>
                                    </div>

                                    <div class="form-group">
                                        <label class="font-weight-bold d-block text-center"> Password:</label>
                                        <input type="password" class="form-control" th:field="*{password}"
                                               required/>
                                    </div>

                                    <div class="text-center">
                                        <button type="submit" class="btn btn-success">Add new user</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</div>
</div>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>

</body>
</html>
