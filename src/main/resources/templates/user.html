<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" >
<head>
    <meta charset="UTF-8">
    <title></title>
</head>
<body>

<form th:action="@{/logout}" method="post">

</form>

<table>

        <th>surname</th>
        <th>age</th>

</html>
