<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

    <title>New User</title>
</head>
<body>

<form th:action="@{/admin/save}" th:object="${user}" method="post">

    <div class="form-group">
        <label>Name:</label>
        <input type="text" class="form-control" th:field="*{name}" required/>
    </div>

    <div class="form-group">
        <label>Surname:</label>
        <input type="text" class="form-control" th:field="*{surname}" required/>
    </div>

    <div class="form-group">
        <label>Age:</label>
        <input type="number" class="form-control" th:field="*{age}" required min = "1"/>
    </div>

    <div class="form-group">
        <label>Email:</label>
        <input type="text" class="form-control" th:field="*{email}" required/>
    </div>

    <div class="form-group">
        <label>Role:</label>
        <select name = "rolesId" class="form-control" multiple >
            <option th:each = "role : ${roles}"
                    th:value = "${role.id}"
                    th:text = "${role.name}">
            </option>
        </select>
    </div>

    <div class="form-group">
        <label>Password:</label>
        <input type="password" class="form-control" th:field="*{password}" required/>
    </div>

    <button type="submit" class="btn btn-success">Save</button>
</form>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>

</body>
</html>
