<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

    <title>New User</title>
</head>
<body>

<form th:action="@{/logout}" method="post">
    <button type="submit">Logout</button>
</form>

<form th:action="@{/admin/save}" th:object="${user}" method="post">

    <label>Name:</label>
    <input type="text" th:field="*{name}" required/>

    <label>Surname:</label>
    <input type="text" th:field="*{surname}" required/>

    <label>Age:</label>
    <input type="number" th:field="*{age}" required min = "1"/>

    <label>Email:</label>
    <input type="text" th:field="*{email}" required/>

    <label>Role:</label>
    <select name = "rolesId" multiple >
        <option th:each = "role : ${roles}"
                th:value = "${role.id}"
                th:text = "${role.name}" r>
        </option>
    </select>

    <label>Password:</label>
    <input type="password" th:field="*{password}" required/>

    <button type="submit">Save</button>
</form>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>

</body>
</html>
